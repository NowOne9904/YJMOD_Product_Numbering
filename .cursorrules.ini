# AntiGravity Skill Loader

[IMPORTANT INSTRUCTIONS]
당신은 코드를 작성하거나 수정하기 전에 반드시 아래 경로의 'AntiGravity Skills Core' 파일들을 읽고 지식을 로드해야 합니다.
- 스킬 허브 경로: C:\Users\My\.gemini\antigravity\skills\

[Operational Rules]
1. 작업 시작 시 스킬 허브 내의 `identity.md`와 `product_logic.md`를 교차 검증(Cross-Check) 하십시오.
2. 제품 코드, 정규식, 데이터 정제와 관련된 코드를 짤 때는 오직 `product_logic.md`에 명시된 규칙만 절대적으로 따르며, 스스로 추측하여 할루시네이션(환각)을 일으키지 마십시오.
3. 디자인 및 UI 요소는 현재 프로젝트에 작성된 코드를 그대로 유지하며 임의로 변경하지 마십시오.